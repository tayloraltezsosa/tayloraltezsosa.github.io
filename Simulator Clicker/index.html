<!DOCTYPE html>
<html lang="en">
	<header>
			<title>Simulator Clicker</title>
			<h1 id="counter"><span style="color:blue">Usted lleva 0 Clicks</h1>
			<button onclick="Click()">Click me</button>
	</header>

		}
	</script>
